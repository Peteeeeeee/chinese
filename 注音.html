<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<title>Zhuyin Master - Enhanced Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#5EC3F0;
    --sky-bottom:#CDEFFF;
    --sun:#FFC857;
    --grass:#5FC98D;
    --fence:#3E8F63;
    --ink:#1F3A5F;
    --card:#FFFFFF;
    --coral:#FF6B6B;
    --coral-dark:#E5484D;
    --purple:#8C7AE6;
    --shadow: 0 12px 24px rgba(31,58,95,0.15);
  }
  *{
    box-sizing:border-box; 
    -webkit-tap-highlight-color:transparent;
    touch-action: manipulation;
  }
  html,body{
    height:100%;
    margin:0;
    padding:0;
    overflow: hidden;
    background: #111827;
  }
  body{
    font-family:'Noto Sans TC', sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
  }
  .display{font-family:'Baloo 2', 'Noto Sans TC', sans-serif;}

  /* Stage Container: 自動適應任何電腦與手機螢幕高度，不破圖不切邊 */
  #stage{
    width: 100vw;
    height: 100vh;
    max-width: 520px;   
    max-height: 95vh;   
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 55%, var(--grass) 55%, #4CBB7E 100%);
    box-shadow: var(--shadow);
  }
  
  /* 當在電腦或大螢幕上時，自動加上邊框，並將內文字級優化放大 */
  @media (min-width: 481px) and (min-height: 500px) {
    #stage {
      border: 6px solid #1f2937;
      border-radius: 20px;
      height: 95vh;
      width: 520px;
    }
    h1.game-title { font-size: 34px !important; }
    .key .zh { font-size: 16px !important; } 
    .key .kl { font-size: 10px !important; } 
    .audio-big-btn { width: 140px !important; height: 140px !important; font-size: 56px !important; } 
  }

  .cloud{
    position:absolute;
    background:#fff;
    border-radius:50px;
    opacity:0.85;
    filter:drop-shadow(0 4px 0 rgba(255,255,255,0.4));
  }
  .sun{
    position:absolute;
    top:12px; right:20px;
    width:50px; height:50px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #FFE29A, var(--sun));
    box-shadow:0 0 0 6px rgba(255,200,87,0.25);
    z-index:0;
  }

  .screen{
    display:none;
    flex:1;
    position:relative;
    z-index:2;
    flex-direction:column;
    height: 100%;
    overflow-y: auto;
  }
  .screen.active{display:flex;}

  /* ---- Start Screen ---- */
  #screen-start{
    align-items:center;
    padding:16px 14px;
    text-align:center;
  }
  .title-card{
    background:var(--card);
    border-radius:24px;
    padding:14px 14px;
    box-shadow:0 8px 0 rgba(31,58,95,0.15);
    width:100%;
    margin-bottom:12px;
  }
  .logo-symbols{
    font-size:14px;
    letter-spacing:6px;
    color:var(--purple);
    font-weight:700;
    margin-bottom:2px;
  }
  h1.game-title{
    font-family:'Baloo 2','Noto Sans TC',sans-serif;
    font-size:28px;
    margin:0 0 2px;
    color:var(--ink);
    font-weight:800;
  }
  
  /* Mode Selector Tabs */
  .mode-selector {
    display: flex;
    background: #f1f5f9;
    padding: 4px;
    border-radius: 12px;
    margin-bottom: 12px;
    border: 1px solid #e2e8f0;
  }
  .mode-tab {
    flex: 1;
    border: none;
    background: transparent;
    padding: 8px 4px;
    font-size: 13px;
    font-weight: 700;
    color: #64748b;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
  }
  .mode-tab.active {
    background: var(--purple);
    color: #fff;
    box-shadow: 0 4px 6px rgba(140,122,230,0.2);
  }

  .custom-mode-box{
    background:#F4F9FF;
    border-radius:16px;
    padding:10px;
    margin-bottom:10px;
    text-align:left;
    border:2px dashed #cbdbe8;
  }
  .custom-mode-title{
    font-size:13px;
    font-weight:700;
    color:var(--ink);
    margin-bottom:6px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .custom-ctrl-btn{
    background:#e2e9f3;
    border:none;
    padding:4px 10px;
    font-size:11px;
    border-radius:6px;
    color:#3a5170;
    cursor:pointer;
    font-weight:700;
  }
  .custom-ctrl-btn:active{ background:#cbd5e1; }
  
  .speed-ctrl-container {
    background: #fff;
    border: 1px solid #e2e9f2;
    border-radius: 10px;
    padding: 6px 12px;
    margin-bottom: 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .speed-label-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
  }
  .speed-slider {
    width: 100%;
    margin: 4px 0;
    accent-color: var(--purple);
    cursor: pointer;
  }

  .checkbox-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(46px, 1fr));
    gap:4px;
    max-height:110px;
    overflow-y:auto;
    padding:4px;
    background:#fff;
    border-radius:10px;
    border:1px solid #e2e9f2;
  }
  .check-label {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    padding: 5px 0;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
  }
  .check-label input { display: none; }
  .check-label:has(input:checked) {
    background: var(--purple);
    color: #fff;
    border-color: var(--purple);
  }

  .high-score-pill{
    display:inline-flex;
    align-items:center;
    background:#FFF3D6;
    color:#946200;
    font-weight:700;
    font-size:12px;
    padding:4px 14px;
    border-radius:999px;
    margin-bottom:8px;
  }
  button.primary{
    font-family:'Baloo 2','Noto Sans TC',sans-serif;
    background:var(--coral);
    color:#fff;
    border:none;
    font-size:18px;
    font-weight:700;
    padding:10px 36px;
    border-radius:999px;
    box-shadow:0 5px 0 var(--coral-dark);
    cursor:pointer;
  }
  button.primary:active{transform:translateY(3px); box-shadow:0 2px 0 var(--coral-dark);}

  /* ---- Game Screen ---- */
  #screen-game{
    padding:0; 
    overflow:hidden;
    display:none;
    flex-direction:column;
    height: 100%;
  }
  #screen-game.active{ display:flex; }
  
  #hud{
    display:flex;
    flex-direction:column;
    gap:6px;
    padding:10px 14px;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    z-index:5;
    flex-shrink: 0;
    border-bottom:1px solid rgba(31,58,95,0.08);
  }
  .hud-top-row {
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
  }
  .hud-bottom-row {
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(255,255,255,0.8);
    padding:4px 10px;
    border-radius:10px;
    border:1px solid #e2e9f2;
  }
  .hud-bottom-row span {
    font-size:11px;
    font-weight:800;
    color:var(--ink);
    white-space:nowrap;
  }
  
  #hearts{display:flex; gap:3px;}
  .heart{font-size:20px; filter:drop-shadow(0 2px 0 rgba(0,0,0,0.08));}
  .heart.lost{opacity:0.25; filter:none;}
  #hud-right{display:flex; align-items:center; gap:8px;}
  .stat{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:14px;
    background:#fff;
    border-radius:12px;
    padding:4px 10px;
    box-shadow:0 3px 0 rgba(31,58,95,0.1);
  }
  #score-stat{color:var(--purple);}
  .hud-btn{
    background:#fff;
    border:none;
    border-radius:12px;
    width:32px;height:32px;
    font-size:14px;
    box-shadow:0 3px 0 rgba(31,58,95,0.1);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  #play-area{
    position:relative;
    flex:1; 
    overflow:hidden;
    background:linear-gradient(180deg,var(--sky-top) 0%, var(--sky-bottom) 100%);
  }
  .cloud-anim{animation:drift linear infinite;}
  @keyframes drift{
    from{transform:translateX(-30px);}
    to{transform:translateX(30px);}
  }

  #ground-line{
    position:absolute;
    left:0; right:0;
    height:6px;
    background:repeating-linear-gradient(90deg, var(--fence) 0 14px, #2f7a4f 14px 16px);
    box-shadow:0 3px 6px rgba(0,0,0,0.15);
    z-index:3;
  }
  #ground-line.flash{
    background:repeating-linear-gradient(90deg, var(--coral) 0 14px, var(--coral-dark) 14px 16px);
  }
  #play-area.shake{animation:shake .25s;}
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    75%{transform:translateX(6px);}
  }

  /* Mode 1 Element */
  .falling{
    position:absolute;
    top:0;
    width:52px; height:52px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#fff;
    border-radius:50%;
    border:3px solid var(--purple);
    box-shadow:0 4px 0 rgba(31,58,95,0.15);
    z-index:2;
  }
  .falling .zh{
    font-family:'Noto Sans TC',sans-serif;
    font-weight:900;
    font-size:21px;
    color:var(--ink);
    line-height:1;
  }
  .falling .keyhint{
    font-family:'Baloo 2',sans-serif;
    font-size:9px;
    color:#9aa9c0;
    margin-top:1px;
    text-transform:uppercase;
  }
  .falling.pop{ animation:pop .25s forwards; }
  @keyframes pop{ to{transform:scale(1.5); opacity:0;} }
  .falling.miss{ animation:missFall .2s forwards; }
  @keyframes missFall{ to{transform:translateY(10px); opacity:0;} }

  /* 🎧 Mode 2: Listening UI */
  #listening-ui {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2;
    padding: 20px;
  }
  #listening-ui.active { display: flex; }
  
  .audio-big-btn {
    width: 115px; height: 115px;
    border-radius: 50%;
    background: #fff;
    border: 6px solid var(--purple);
    box-shadow: 0 10px 0 rgba(140,122,230,0.3), var(--shadow);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .audio-big-btn:active { transform: scale(0.95); }
  .audio-big-btn.waiting {
    opacity: 0.6;
    border-color: #94a3b8;
    pointer-events: none;
  }
  
  .listening-tip {
    margin-top: 18px;
    background: rgba(31,58,95,0.75);
    color: #fff;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    backdrop-filter: blur(4px);
    text-align: center;
    max-width: 90%;
  }

  /* Mode 2 Countdown Timer Bar */
  #timer-bar-container {
    display: none;
    position: absolute;
    left: 12%; right: 12%;
    height: 14px;
    background: rgba(255,255,255,0.4);
    border-radius: 10px;
    border: 2px solid #fff;
    overflow: hidden;
    z-index: 4;
  }
  #timer-bar-container.active { display: block; }
  #timer-bar-fill {
    width: 100%; height: 100%;
    background: linear-gradient(90deg, #8C7AE6, #FF6B6B);
    border-radius: 6px;
    transition: width 0.05s linear;
  }
  
  .float-score{
    position:absolute;
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    color:var(--purple);
    font-size:18px;
    z-index:6;
    animation:floatUp .7s forwards;
    pointer-events:none;
  }
  @keyframes floatUp{
    from{opacity:1; transform:translateY(0);}
    to{opacity:0; transform:translateY(-30px);}
  }

  /* Keyboard Layout Container */
  #keyboard{
    background:#EAF3FB;
    padding:8px 6px 12px;
    z-index:5;
    position:relative;
    border-top:2px solid #d5e6f5;
    flex-shrink: 0;
  }
  .kb-row{
    display:flex;
    justify-content:center;
    gap:4px;
    margin-bottom:4px;
  }
  .key{
    flex:1;
    max-width:44px;
    aspect-ratio:1/1;
    background:#fff;
    border:none;
    border-radius:6px;
    box-shadow:0 3px 0 rgba(31,58,95,0.15);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:2px 0;
    cursor:pointer;
  }
  .key .zh{font-family:'Noto Sans TC',sans-serif; font-weight:700; font-size:14px; color:var(--ink);}
  .key .kl{font-family:'Baloo 2',sans-serif; font-size:9px; color:#9aa9c0; margin-top:1px;}
  .key:active{transform:translateY(2px); box-shadow:0 1px 0 rgba(31,58,95,0.15); background:#f0f4f8;}
  .key.ghost { background:transparent; box-shadow:none; cursor:default; }
  .key.ghost .zh{color:#b9c9dd; font-size:11px;}
  .kb-note{
    text-align:center;
    font-size:10px;
    color:#7f93ab;
    margin-top:2px;
  }

  /* ---- Pause Overlay ---- */
  #pause-overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(31, 58, 95, 0.6);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    z-index: 10;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #pause-overlay.active { display: flex; }
  .pause-card {
    background: var(--card);
    border-radius: 28px;
    padding: 32px 24px;
    box-shadow: var(--shadow);
    max-width: 300px;
    width: 100%;
    text-align: center;
  }
  .pause-title {
    font-family: 'Baloo 2', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--purple);
    margin: 0 0 20px;
  }
  .pause-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  button.secondary {
    font-family: 'Noto Sans TC', sans-serif;
    background: #e2e9f3;
    color: #4a5d78;
    border: none;
    font-size: 16px;
    font-weight: 700;
    padding: 12px 0;
    border-radius: 999px;
    box-shadow: 0 4px 0 #cbd5e1;
    cursor: pointer;
  }
  button.secondary:active { transform: translateY(2px); box-shadow: 0 2px 0 #cbd5e1; }

  /* ---- Game Over Screen ---- */
  #screen-over{
    align-items:center;
    justify-content:center;
    padding:24px;
    text-align:center;
    overflow:hidden;
  }
  .over-card{
    background:var(--card);
    border-radius:28px;
    padding:30px 26px;
    box-shadow:var(--shadow);
    max-width:320px;
    width:100%;
  }
  .over-title{
    font-family:'Baloo 2',sans-serif;
    font-size:28px;
    font-weight:800;
    color:var(--coral-dark);
    margin:0 0 18px;
  }
  .over-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:10px 0;
    border-bottom:1px dashed #e2e9f2;
  }
  .over-row:last-of-type{border-bottom:none;}
  .over-label{font-size:13px; color:#5b7291;}
  .over-value{font-family:'Baloo 2',sans-serif; font-size:22px; font-weight:700; color:var(--ink);}
  .over-value.best{color:var(--sun); text-shadow:0 1px 0 rgba(0,0,0,0.08);}
  .new-best{
    display:inline-block;
    font-size:11px;
    background:var(--sun);
    color:#7a4b00;
    font-weight:700;
    padding:2px 8px;
    border-radius:999px;
    margin-left:6px;
    vertical-align:middle;
  }
  #restart-btn{margin-top:20px;}
</style>
</head>
<body>

<div id="stage">

  <section id="screen-start" class="screen active">
    <div class="sun"></div>
    <div class="title-card">
      <div class="logo-symbols">ㄅ ㄆ ㄇ ㄈ</div>
      <h1 class="game-title">Zhuyin Master</h1>
      
      <div class="mode-selector">
        <button class="mode-tab active" id="tab-mode-1">💧 Master Challenge</button>
        <button class="mode-tab" id="tab-mode-2">🔊 Listening Test</button>
      </div>
      
      <div class="custom-mode-box">
        <div class="speed-ctrl-container">
          <div class="speed-label-row">
            <span>⚙️ Initial Difficulty Speed:</span>
            <span id="speed-slider-val" style="color:var(--purple); font-family:'Baloo 2', sans-serif;">Spd 1</span>
          </div>
          <input type="range" id="initial-speed-range" class="speed-slider" min="1" max="10" value="1">
        </div>

        <div class="custom-mode-title">
          <span id="pool-title-label">🎯 Custom Characters Pool:</span>
          <div>
            <button class="custom-ctrl-btn" id="btn-select-all">All</button>
            <button class="custom-ctrl-btn" id="btn-clear-all" style="margin-left:4px;">Clear</button>
          </div>
        </div>
        <div class="checkbox-grid" id="zhuyin-selector-grid"></div>
      </div>

      <div class="high-score-pill" id="start-highscore">🏆 Best Score: 0</div>
      <br>
      <button class="primary display" id="start-btn">START GAME</button>
      <div style="margin-top:8px;">
        <button id="test-sound-btn" style="font-family:'Noto Sans TC',sans-serif;font-size:12px;background:#F4F9FF;border:1px solid #dbe8f7;color:#3a5170;padding:5px 14px;border-radius:999px;cursor:pointer;">🔊 Test System Sound</button>
        <div id="test-sound-result" style="font-size:11px;color:#5b7291;margin-top:4px;line-height:1.4;"></div>
      </div>
    </div>
  </section>

  <section id="screen-game" class="screen">
    <div id="hud">
      <div class="hud-top-row">
        <div id="hearts"></div>
        <div id="hud-right">
          <div class="stat" id="score-stat">0 Pts</div>
          <button id="sound-toggle" class="hud-btn">🔊</button>
          <button id="pause-btn" class="hud-btn">⏸️</button>
        </div>
      </div>
      <div class="hud-bottom-row">
        <span id="hud-speed-label">⚡ Live Speed: Spd 1</span>
        <input type="range" id="hud-speed-range" class="speed-slider" min="1" max="10" value="1" style="margin:0; flex:1;">
      </div>
    </div>

    <div id="play-area">
      <div class="cloud cloud-anim" style="width:70px;height:26px;top:14px;left:8%; animation-duration:9s;"></div>
      <div class="cloud cloud-anim" style="width:50px;height:20px;top:40px;left:60%; animation-duration:11s;"></div>
      
      <div id="ground-line"></div>
      
      <div id="listening-ui">
        <button class="audio-big-btn" id="btn-replay-audio">🔊</button>
        <div class="listening-tip" id="listening-status-text">Listen carefully and tap the keyboard below!</div>
      </div>

      <div id="timer-bar-container">
        <div id="timer-bar-fill"></div>
      </div>
      
      <div id="pause-overlay">
        <div class="pause-card">
          <div class="pause-title">PAUSED</div>
          <div class="pause-actions">
            <button class="primary display" id="resume-btn">RESUME</button>
            <button class="secondary" id="quit-btn">QUIT TO MENU</button>
          </div>
        </div>
      </div>
    </div>

    <div id="keyboard"></div>
  </section>

  <section id="screen-over" class="screen">
    <div class="over-card">
      <div class="over-title display">GAME OVER</div>
      <div class="over-row">
        <span class="over-label">Your Score</span>
        <span class="over-value display" id="final-score">0 Pts</span>
      </div>
      <div class="over-row">
        <span class="over-label">High Score <span id="new-best-badge"></span></span>
        <span class="over-value best display" id="final-best">0 Pts</span>
      </div>
      <button class="primary display" id="restart-btn">PLAY AGAIN</button>
    </div>
  </section>
</div>

<script>
(function(){
  "use strict";

  var ROWS = [
    [["1","ㄅ"],["2","ㄉ"],["3",null],["4",null],["5","ㄓ"],["6",null],["7",null],["8","ㄚ"],["9","ㄞ"],["0","ㄢ"],["-","ㄦ"]],
    [["q","ㄆ"],["w","ㄊ"],["e","ㄍ"],["r","ㄐ"],["t","ㄔ"],["y","ㄗ"],["u","ㄧ"],["i","ㄛ"],["o","ㄟ"],["p","ㄣ"]],

    [["z","ㄈ"],["x","ㄌ"],["c","ㄏ"],["v","ㄒ"],["b","ㄖ"],["n","ㄙ"],["m","ㄩ"],[",","ㄝ"],[".","ㄡ"],["/","ㄥ"]]
  ];

  var KEY_TO_SYMBOL = {};

  /* ---------------- Game State ---------------- */

    "ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ","ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","ㄕ","ㄖ","ㄗ","ㄘ","ㄙ",

    "ㄧ","ㄨ","ㄩ"
  ];
  
  var SYMBOL_TO_AUDIO = {};
  CANONICAL_ORDER.forEach(function(sym, idx){
    SYMBOL_TO_AUDIO[sym] = AUDIO_BASE + "F" + (idx+1) + ".WAV";
  });
  var audioCache = {}; 

  function warmUpAudio(){
    CANONICAL_ORDER.forEach(function(sym){
      try{
        var a = new Audio(SYMBOL_TO_AUDIO[sym]);
        a.preload = 'auto';
        audioCache[sym] = a;
      }catch(e){}
    });
  }

  function playPronunciation(symbol, onEndedCallback){
    if(!state.soundOn) {
      if(onEndedCallback) setTimeout(onEndedCallback, 600);
      return;
    }
    var a = audioCache[symbol];
    try{
      if(a){
        a.currentTime = 0;
        if(onEndedCallback) {
          a.onended = function() { a.onended = null; onEndedCallback(); };
        }
        var p = a.play();
        if(p && p.catch) p.catch(function(){ speak(symbol, onEndedCallback); });
        return;
      }
      var url = SYMBOL_TO_AUDIO[symbol];
      if(url){
        var fresh = new Audio(url);
        if(onEndedCallback) {
          fresh.onended = function() { fresh.onended = null; onEndedCallback(); };
        }
        var p2 = fresh.play();
        if(p2 && p2.catch) p2.catch(function(){ speak(symbol, onEndedCallback); });
        return;
      }
    }catch(e){}
    speak(symbol, onEndedCallback); 
  }

  var audioCtx = null;
  function getAudioCtx(){
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ audioCtx = null; }
    }
    return audioCtx;
  }

  function playKlaxonHorn(onEndedCallback) {
    if(!state.soundOn) {
      if(onEndedCallback) setTimeout(onEndedCallback, 400);
      return;
    }
    var ctx = getAudioCtx();
    if(!ctx) {
      if(onEndedCallback) setTimeout(onEndedCallback, 400);
      return;
    }
    try {
      if(ctx.state === 'suspended'){ ctx.resume(); }
      var now = ctx.currentTime;
      var osc1 = ctx.createOscillator();
      var osc2 = ctx.createOscillator();
      var gainNode = ctx.createGain();
      
      osc1.type = 'sawtooth'; 
      osc1.frequency.setValueAtTime(150, now);
      osc1.frequency.linearRampToValueAtTime(120, now + 0.35);
      
      osc2.type = 'square';
      osc2.frequency.setValueAtTime(225, now);
      osc2.frequency.linearRampToValueAtTime(190, now + 0.35);
      
      gainNode.gain.setValueAtTime(0.2, now);
      gainNode.gain.linearRampToValueAtTime(0.15, now + 0.1);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.38);
      
      osc1.connect(gainNode);
      osc2.connect(gainNode);
      gainNode.connect(ctx.destination);
      
      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 0.38);
      osc2.stop(now + 0.38);
      
      if(onEndedCallback) {
        setTimeout(onEndedCallback, 400);
      }
    } catch(e) {
      if(onEndedCallback) setTimeout(onEndedCallback, 400);
    }
  }

  var speechVoices = [];
  function loadVoices(){
    if(!('speechSynthesis' in window)) return;
    speechVoices = window.speechSynthesis.getVoices() || [];
  }
  if('speechSynthesis' in window){
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }
  function pickVoice(){
    if(!speechVoices.length) return null;
    return speechVoices.find(function(v){ return v.lang === 'zh-TW'; })
        || speechVoices.find(function(v){ return /^zh/i.test(v.lang); })
        || null;
  }
  function speak(symbol, onEndedCallback){
    if(!state.soundOn) {
      if(onEndedCallback) setTimeout(onEndedCallback, 500);
      return;
    }
    if(!('speechSynthesis' in window)) {
      if(onEndedCallback) setTimeout(onEndedCallback, 500);
      return;
    }
    try{
      var text = READING[symbol] || symbol;
      var SampleUtterance = new SpeechSynthesisUtterance(text);
      SampleUtterance.lang = 'zh-TW';
      SampleUtterance.rate = 0.85;
      var v = pickVoice();
      if(v) SampleUtterance.voice = v;
      if(onEndedCallback) {
        SampleUtterance.onend = function() { SampleUtterance.onend = null; onEndedCallback(); };
        SampleUtterance.onerror = function() { SampleUtterance.onerror = null; onEndedCallback(); };
      }
      window.speechSynthesis.speak(SampleUtterance);
    }catch(e){
      if(onEndedCallback) setTimeout(onEndedCallback, 500);
    }
  }

  function unlockAudio(){
    var ctx = getAudioCtx();
    if(ctx && ctx.state === 'suspended') ctx.resume();
    warmUpAudio();
  }

  /* ---------------- Custom Selector Grid ---------------- */

  function updateActivePool(){
    var pool = [];
    var checkboxes = document.querySelectorAll('#zhuyin-selector-grid input[type="checkbox"]');
    checkboxes.forEach(function(cb){
      if(cb.checked){ pool.push(cb.value); }
    });
    activePool = pool;
    return pool.length > 0;
  }

  /* ⚖️ Speed Calculation Mechanics */
  function calculateTimingsBySpeed(level) {
    var spawnInterval = 4800 - (level - 1) * 420;
    var fallDuration = 19000 - (level - 1) * 1700;
    var m2Limit = 9500 - (level - 1) * 900; 
    
    return {
      spawnInterval: Math.max(800, spawnInterval),
      fallDuration: Math.max(3000, fallDuration),
      m2Limit: Math.max(1500, m2Limit)
    };
  }

  function setSpeedRuntime(level) {
    state.speedLevel = level;
    var timings = calculateTimingsBySpeed(level);
    state.spawnInterval = timings.spawnInterval;
    state.fallDuration = timings.fallDuration;
    
    var oldLimit = state.mode2TimeLimit;
    state.mode2TimeLimit = timings.m2Limit;
    if(state.gameMode === 2 && oldLimit > 0 && !state.mode2IsWaitingForNext) {
      state.mode2TimeLeft = (state.mode2TimeLeft / oldLimit) * state.mode2TimeLimit;
    }
    
    hudSpeedRange.value = level;
    hudSpeedLabel.textContent = '⚡ Live Speed: Spd ' + level;
  }

  /* ---------------- Mode 1: Falling Symbols ---------------- */
  var spawnTimeLeft = 0; 

  function spawnSymbol(){
    if(activePool.length === 0) return;
    var sym = activePool[Math.floor(Math.random()*activePool.length)];
    var key = SYMBOL_TO_KEY[sym];
    var el = document.createElement('div');
    el.className = 'falling';
    el.innerHTML = '<span class="zh">'+sym+'</span><span class="keyhint">'+key.toUpperCase()+'</span>';
    var leftPercent = 8 + Math.random()*78; 
    el.style.left = leftPercent + '%';
    el.style.top = '0%';
    playArea.appendChild(el);

    var item = {
      id: ++itemSeq,
      char: sym,
      key: key,
      el: el,
      startTime: performance.now()
    };
    fallingItems.push(item);
  }

  function scheduleNextSpawn(customDelay){
    if(!state.playing || state.paused || state.gameMode !== 1) return;
    var delay = (customDelay !== undefined) ? customDelay : state.spawnInterval;
    spawnTimeLeft = delay;

    spawnTimer = setTimeout(function(){
      spawnSymbol();
      scheduleNextSpawn();
    }, delay);
  }

  /* ---------------- Mode 2: Audio Queueing Logic ---------------- */
  // generateNew: true 代表抽新題目；false 代表重播舊題目（答錯或超時重來）
  function generateListeningQuestion(generateNew) {
    if(!state.playing || state.gameMode !== 2) return;
    if(activePool.length === 0) return;
    
    if (generateNew === undefined) generateNew = true; 

    state.mode2IsWaitingForNext = true;
    replayAudioBtn.classList.add('waiting');
    listeningStatusText.textContent = generateNew ? "Loading voice prompt..." : "Try again! Reloading audio...";
    timerBarFill.style.width = '100%';

    if (generateNew) {
      var randomSymbol = activePool[Math.floor(Math.random() * activePool.length)];
      state.currentQuestion = randomSymbol;
    }
    
    var timings = calculateTimingsBySpeed(state.speedLevel);
    state.mode2TimeLimit = timings.m2Limit;
    state.mode2TimeLeft = timings.m2Limit;
    
    setTimeout(function() {
      if(!state.playing || state.paused) return;
      
      playPronunciation(state.currentQuestion, function() {
        if(!state.playing || state.paused) return;
        
        state.mode2IsWaitingForNext = false;
        replayAudioBtn.classList.remove('waiting');
        listeningStatusText.textContent = generateNew ? "Listen and tap the matching key!" : "Listen again and find the right key!";
      });
    }, 200);
  }

  /* ---------------- Core Animation Loop ---------------- */
  function tick(now){
    if(!state.playing) return;
    
    if(state.paused) {
      lastTickTime = now;
      rafId = requestAnimationFrame(tick);
      return;
    }

    var deltaTime = now - lastTickTime;
    lastTickTime = now;
    
    // ----- MODE 1 -----
    if (state.gameMode === 1) {
      if (spawnTimeLeft > 0) {
        spawnTimeLeft -= deltaTime;
      }

      var h = playArea.clientHeight || 500;
      var groundPixel = h * (GROUND_PERCENT / 100);
      groundLine.style.top = groundPixel + 'px';

      for(var i=fallingItems.length-1;i>=0;i--){
        var item = fallingItems[i];
        if (item.pausedTimeDelta) {
          item.startTime += item.pausedTimeDelta;
          delete item.pausedTimeDelta;
        }
        var elapsed = now - item.startTime;
        var progress = elapsed / state.fallDuration;
        if(progress >= 1){
          removeItemAt(i,'miss');
          playKlaxonHorn(); 
          loseLife();
          continue;
        }
        item.el.style.top = (progress * GROUND_PERCENT) + '%';
      }
    } 
    // ----- MODE 2 -----
    else if (state.gameMode === 2) {
      if (!state.mode2IsWaitingForNext) {
        state.mode2TimeLeft -= deltaTime;
        if (state.mode2TimeLeft <= 0) {
          state.mode2TimeLeft = 0;
          timerBarFill.style.width = '0%';
          
          state.mode2IsWaitingForNext = true;
          replayAudioBtn.classList.add('waiting');
          
          flashGroundEffect();
          deductPointsOrLife();
          
          if (state.lives > 0) {
            playKlaxonHorn(function() {
              // 超時答錯：不換新題目，同一題再重來一次
              generateListeningQuestion(false);
            });
          }
        } else {
          var percentage = (state.mode2TimeLeft / state.mode2TimeLimit) * 100;
          timerBarFill.style.width = percentage + '%';
        }
      }
    }

    rafId = requestAnimationFrame(tick);
  }

  function removeItemAt(index, animClass){
    var item = fallingItems[index];
    if(!item) return;
    item.el.classList.add(animClass);
    (function(el){
      setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 260);
    })(item.el);
    fallingItems.splice(index,1);
  }

  function flashGroundEffect(){
    groundLine.classList.add('flash');
    playArea.classList.add('shake');
    setTimeout(function(){
      groundLine.classList.remove('flash');
      playArea.classList.remove('shake');
    }, 220);
  }

  function deductPointsOrLife() {
    state.score = Math.max(0, state.score - 5);
    scoreStat.textContent = state.score + ' Pts';
    
    var areaRect = playArea.getBoundingClientRect();
    showFloatingScore(areaRect.width/2 - 20, 40, '-5 Pts', '#FF6B6B');

    state.lives--;
    renderHearts();
    if(state.lives <= 0){
      endGame();
    }
  }

  function loseLife(){
    state.lives--;
    renderHearts();
    flashGroundEffect();
    if(state.lives <= 0){
      endGame();
    }
  }

  function showFloatingScore(x, y, text, color){
    var f = document.createElement('div');
    f.className = 'float-score';
    f.textContent = text;
    f.style.left = x + 'px';
    f.style.top = y + 'px';
    f.style.color = color || '';
    playArea.appendChild(f);
    setTimeout(function(){ if(f.parentNode) f.parentNode.removeChild(f); }, 720);
  }

  /* ---------------- Input Handling ---------------- */
  function handleKeyInput(rawKey){
    if(!state.playing || state.paused) return; 
    
    if (state.gameMode === 2 && state.mode2IsWaitingForNext) return;

    var key = rawKey.toLowerCase();
    var symbol = KEY_TO_SYMBOL[key];
    if(!symbol) return; 

    // ---- Mode 1 ----
    if (state.gameMode === 1) {
      var matchIndex = -1;
      var earliestStart = Infinity;
      for(var i=0; i<fallingItems.length; i++){
        if(fallingItems[i].char === symbol && fallingItems[i].startTime < earliestStart){
          earliestStart = fallingItems[i].startTime;
          matchIndex = i;
        }
      }

      if(matchIndex === -1){
        playKlaxonHorn(); 
        loseLife();
        return;
      }

      var item = fallingItems[matchIndex];
      var rect = item.el.getBoundingClientRect();
      var areaRect = playArea.getBoundingClientRect();
      showFloatingScore(rect.left - areaRect.left, rect.top - areaRect.top, '+5 Pts', '#8C7AE6');
      playPronunciation(symbol);
      removeItemAt(matchIndex, 'pop');

      processSuccess();
    } 
    // ---- Mode 2 (Listening) ----
    else if (state.gameMode === 2) {
      state.mode2IsWaitingForNext = true; 
      replayAudioBtn.classList.add('waiting');

      if (symbol === state.currentQuestion) {
        var areaRect = playArea.getBoundingClientRect();
        showFloatingScore(areaRect.width/2 - 20, 40, '+5 Pts', '#8C7AE6');
        processSuccess();
        
        playPronunciation(symbol, function() {
          listeningStatusText.textContent = "Excellent! Next question in 1s...";
          setTimeout(function() {
            // 答對了：抽下一題新題目
            generateListeningQuestion(true);
          }, 1000); 
        });
      } else {
        // 答錯了：扣分扣生命值
        flashGroundEffect();
        deductPointsOrLife();
        
        if (state.lives > 0) {
          playKlaxonHorn(function() {
            // 答錯重來：傳入 false 代表原地重複同一題，不換新題目
            generateListeningQuestion(false);
          });
        }
      }
    }
  }

  function processSuccess() {
    state.score += 5;
    state.successCount += 1;
    scoreStat.textContent = state.score + ' Pts';

    if(state.successCount % 10 === 0 && state.speedLevel < 10){
      setSpeedRuntime(state.speedLevel + 1);
    }
  }

  document.addEventListener('keydown', function(e){
    if(e.repeat) return;
    if(state.activeScreen === 'game' && !state.paused) {
      if(e.key === 'Escape') { pauseGame(); return; }
      handleKeyInput(e.key);
    }
    else if(state.activeScreen === 'game' && state.paused) {
      if(e.key === ' ' || e.key === 'Escape' || e.key === 'Enter') { e.preventDefault(); resumeGame(); }
      else if(e.key === 'Backspace') { quitToMenu(); }
    }
    else if(state.activeScreen === 'start' || state.activeScreen === 'over') {
      if(e.key === 'Enter') { 
        unlockAudio(); 
        var ok = updateActivePool();
        if(!ok){ alert('Please select at least one character to play!'); return; }
        startGame(); 
      }
    }
  });

  /* ---------------- Control Functions ---------------- */
  var pauseStartTimestamp = 0;

  function pauseGame() {
    if (!state.playing || state.paused) return;
    state.paused = true;
    pauseStartTimestamp = performance.now();
    clearTimeout(spawnTimer); 
    pauseOverlay.classList.add('active');
  }

  function resumeGame() {
    if (!state.playing || !state.paused) return;
    state.paused = false;
    var pauseDuration = performance.now() - pauseStartTimestamp;
    
    if (state.gameMode === 1) {
      fallingItems.forEach(function(item) {
        item.pausedTimeDelta = pauseDuration;
      });
      var nextDelay = Math.max(50, spawnTimeLeft);
      scheduleNextSpawn(nextDelay);
    }
    
    pauseOverlay.classList.remove('active');
  }

  function quitToMenu() {
    state.playing = false;
    state.mode2IsWaitingForNext = false;
    clearTimeout(spawnTimer);
    cancelAnimationFrame(rafId);
    pauseOverlay.classList.remove('active');
    loadHighScore();
    showScreen('screen-start');
  }

  /* ---------------- Screen Layout Calibrations ---------------- */
  function showScreen(id){
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
    
    if(id === 'screen-start') state.activeScreen = 'start';
    if(id === 'screen-game') state.activeScreen = 'game';
    if(id === 'screen-over') state.activeScreen = 'over';
  }

  function setupGameLayout() {
    if(state.gameMode === 1) {
      groundLine.style.display = 'block';
      listeningUi.classList.remove('active');
      timerBarContainer.classList.remove('active');
    } else {
      groundLine.style.display = 'none';
      listeningUi.classList.add('active');
      timerBarContainer.classList.add('active');
      timerBarContainer.style.bottom = '14px'; 
    }
  }

  function resetState(){
    var chosenSpeed = parseInt(speedRangeInput.value, 10) || 1;

    state.playing = true;
    state.paused = false;
    state.lives = 5;
    state.score = 0;
    state.successCount = 0;
    state.mode2IsWaitingForNext = false;

    setSpeedRuntime(chosenSpeed);
    setupGameLayout();

    pauseOverlay.classList.remove('active');
    
    fallingItems.forEach(function(item){ if(item.el.parentNode) item.el.parentNode.removeChild(item.el); });
    fallingItems = [];
    
    renderHearts();
    scoreStat.textContent = '0 Pts';
  }

  function startGame(){
    resetState();
    showScreen('screen-game');
    lastTickTime = performance.now();
    
    if (state.gameMode === 1) {
      scheduleNextSpawn();
    } else {
      // 遊戲一開始抽新題目
      generateListeningQuestion(true);
    }
    
    rafId = requestAnimationFrame(tick);
  }

  function endGame(){
    state.playing = false;
    clearTimeout(spawnTimer);
    cancelAnimationFrame(rafId);

    var currentBest = 0;
    var bestKey = getStorageKey();
    
    if(typeof window.storage !== 'undefined') {
      window.storage.get(bestKey).then(function(res){
        currentBest = (res && res.value) ? parseInt(res.value,10) || 0 : 0;
        proceedEnd(currentBest);
      }).catch(function(){ proceedEnd(0); });
    } else {
      proceedEnd(0);
    }
  }
  
  function proceedEnd(bestVal) {
    var isNewBest = state.score > bestVal;
    if(isNewBest){
      bestVal = state.score;
      saveHighScore(bestVal);
    }
    document.getElementById('final-score').textContent = state.score + ' Pts';
    document.getElementById('final-best').textContent = bestVal + ' Pts';
    document.getElementById('new-best-badge').innerHTML = isNewBest ? '<span class="new-best">NEW!</span>' : '';
    showScreen('screen-over');
  }

  /* ---------------- Bindings ---------------- */
  document.getElementById('tab-mode-1').addEventListener('click', function() {
    state.gameMode = 1;
    this.classList.add('active');
    document.getElementById('tab-mode-2').classList.remove('active');
    loadHighScore();
  });
  
  document.getElementById('tab-mode-2').addEventListener('click', function() {
    state.gameMode = 2;
    this.classList.add('active');
    document.getElementById('tab-mode-1').classList.remove('active');
    loadHighScore();
  });

  speedRangeInput.addEventListener('input', function() {
    speedSliderValLabel.textContent = 'Spd ' + speedRangeInput.value;
  });

  hudSpeedRange.addEventListener('input', function() {
    var val = parseInt(hudSpeedRange.value, 10) || 1;
    setSpeedRuntime(val);
  });

  soundToggle.addEventListener('click', function(){
    state.soundOn = !state.soundOn;
    soundToggle.textContent = state.soundOn ? '🔊' : '🔇';
  });

  pauseBtn.addEventListener('click', function() {
    pauseGame();
  });

  document.getElementById('resume-btn').addEventListener('click', function() {
    resumeGame();
  });

  document.getElementById('quit-btn').addEventListener('click', function() {
    quitToMenu();
  });
  
  replayAudioBtn.addEventListener('click', function() {
    if (state.playing && !state.paused && state.currentQuestion && !state.mode2IsWaitingForNext) {
      playPronunciation(state.currentQuestion);
    }
  });

  document.getElementById('test-sound-btn').addEventListener('click', function(){
    unlockAudio();
    var out = document.getElementById('test-sound-result');
    out.innerHTML = 'Testing...';
    var lines = [];

    try{
      var ctx = getAudioCtx();
      if(ctx){
        playKlaxonHorn();
        lines.push('✅ Alarm Sound triggered (Context: ' + ctx.state + ')');
      } else {
        lines.push('❌ Browser Web Audio API not supported.');
      }
    }catch(e){ lines.push('❌ Alarm Failure: ' + e.message); }

    try{
      var testAudio = new Audio(SYMBOL_TO_AUDIO['ㄅ']);
      var p = testAudio.play();
      if(p && p.then){
        p.then(function(){ lines.push('✅ Audio assets loaded perfectly'); render(); })
         .catch(function(err){ lines.push('⚠️ Autoplay restricted. Audio will fully unlock once you click "START GAME".'); render(); });
      } else {
        lines.push('⚠️ Dispatching audio streaming request...');
      }
    }catch(e){ lines.push('❌ Voice system error: ' + e.message); }

    function render(){ out.innerHTML = lines.join('<br>'); }
    render();
  });

  document.getElementById('start-btn').addEventListener('click', function(){
    unlockAudio();
    var hasSelected = updateActivePool();
    if(!hasSelected){
      alert('Please check at least one symbol checkbox to customize your training range!');
      return;
    }
    startGame();
  });
  
  document.getElementById('restart-btn').addEventListener('click', function(){
    unlockAudio();
    startGame();
  });

  buildKeyboard();
  buildZhuyinSelector();
  loadHighScore();
})();
</script>
</body>
</html>
