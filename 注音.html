<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<title>Zhuyin Master - Pure Zhuyin Version</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght=500;700;800&family=Noto+Sans+TC:wght=500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#5EC3F0;
    --sky-bottom:#CDEFFF;
    --sun:#FFC857;
    --grass:#5FC98D;
    --fence:#3E8F63;
    --ink:#1F3A5F;
    --card:#FFFFFF;
    --coral:#FF6B6B;
    --coral-dark:#E5484D;
    --purple:#8C7AE6;
    --shadow: 0 8px 16px rgba(31,58,95,0.12);
  }
  *{
    box-sizing:border-box; 
    -webkit-tap-highlight-color:transparent;
    touch-action: manipulation;
  }
  html,body{
    height:100%;
    margin:0;
    padding:0;
    overflow: hidden;
    background: #111827;
  }
  body{
    font-family:'Noto Sans TC', sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .display{font-family:'Baloo 2', 'Noto Sans TC', sans-serif;}

  #stage{
    width: 100vw;
    height: 100vh;
    height: -webkit-fill-available; 
    max-width: 480px;   
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 55%, var(--grass) 55%, #4CBB7E 100%);
  }
  
  @media (min-width: 481px) and (min-height: 500px) {
    #stage {
      border: 6px solid #1f2937;
      border-radius: 20px;
      height: 92vh;
      box-shadow: var(--shadow);
    }
    h1.game-title { font-size: 32px !important; }
  }

  .sun{
    position:absolute;
    top:12px; right:20px;
    width:40px; height:40px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #FFE29A, var(--sun));
    box-shadow:0 0 0 4px rgba(255,200,87,0.25);
    z-index:0;
  }

  .screen{
    display:none;
    flex:1;
    position:relative;
    z-index:2;
    flex-direction:column;
    height: 100%;
    overflow-y: auto;
  }
  .screen.active{display:flex;}

  /* ---- Start Screen ---- */
  #screen-start{
    align-items:center;
    padding:12px;
    text-align:center;
    justify-content: center;
  }
  .title-card{
    background:var(--card);
    border-radius:20px;
    padding:16px 14px;
    box-shadow:0 6px 0 rgba(31,58,95,0.1);
    width:100%;
    max-height: 95%;
    overflow-y: auto;
  }
  .logo-symbols{
    font-size:12px;
    letter-spacing:4px;
    color:var(--purple);
    font-weight:700;
    margin-bottom:2px;
  }
  h1.game-title{
    font-size:24px;
    margin:0 0 8px;
    color:var(--ink);
    font-weight:800;
  }
  
  .mode-selector {
    display: flex;
    background: #f1f5f9;
    padding: 3px;
    border-radius: 10px;
    margin-bottom: 8px;
    border: 1px solid #e2e8f0;
  }
  .mode-tab {
    flex: 1;
    border: none;
    background: transparent;
    padding: 6px 2px;
    font-size: 12px;
    font-weight: 700;
    color: #64748b;
    cursor: pointer;
    border-radius: 7px;
  }
  .mode-tab.active {
    background: var(--purple);
    color: #fff;
  }

  .custom-mode-box{
    background:#F4F9FF;
    border-radius:12px;
    padding:8px;
    margin-bottom:8px;
    text-align:left;
    border:1.5px dashed #cbdbe8;
  }
  .custom-mode-title{
    font-size:12px;
    font-weight:700;
    color:var(--ink);
    margin-bottom:4px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .custom-ctrl-btn{
    background:#e2e9f3;
    border:none;
    padding:3px 8px;
    font-size:10px;
    border-radius:5px;
    color:#3a5170;
    font-weight:700;
  }
  
  .speed-ctrl-container {
    background: #fff;
    border: 1px solid #e2e9f2;
    border-radius: 8px;
    padding: 4px 10px;
    margin-bottom: 6px;
  }
  .speed-label-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 700;
  }
  .speed-slider {
    width: 100%;
    margin: 2px 0;
    accent-color: var(--purple);
  }

  .checkbox-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
    gap:4px;
    max-height:100px;
    overflow-y:auto;
    padding:4px;
    background:#fff;
    border-radius:8px;
    border:1px solid #e2e9f2;
  }
  .check-label {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 5px;
    padding: 4px 0;
    font-size: 12px;
    font-weight: 700;
  }
  .check-label input { display: none; }
  .check-label:has(input:checked) {
    background: var(--purple);
    color: #fff;
    border-color: var(--purple);
  }

  .high-score-pill{
    display:inline-flex;
    background:#FFF3D6;
    color:#946200;
    font-weight:700;
    font-size:11px;
    padding:3px 12px;
    border-radius:999px;
    margin-bottom:6px;
  }
  button.primary{
    background:var(--coral);
    color:#fff;
    border:none;
    font-size:16px;
    font-weight:700;
    padding:8px 28px;
    border-radius:999px;
    box-shadow:0 4px 0 var(--coral-dark);
  }
  button.primary:active{transform:translateY(2px); box-shadow:0 2px 0 var(--coral-dark);}

  /* ---- Game Screen ---- */
  #screen-game{
    padding:0; 
    overflow:hidden;
    display:none;
    flex-direction:column;
    height: 100%;
  }
  #screen-game.active{ display:flex; }
  
  #hud{
    display:flex;
    flex-direction:column;
    gap:4px;
    padding:8px 12px;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    z-index:5;
    flex-shrink: 0;
  }
  .hud-top-row {
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .hud-bottom-row {
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,0.8);
    padding:3px 8px;
    border-radius:8px;
    border:1px solid #e2e9f2;
  }
  .hud-bottom-row span {
    font-size:10px;
    font-weight:800;
    color:var(--ink);
  }
  
  #hearts{display:flex; gap:2px;}
  .heart{font-size:16px;}
  .heart.lost{opacity:0.25;}
  .stat{
    font-weight:700;
    font-size:13px;
    background:#fff;
    border-radius:10px;
    padding:3px 8px;
    box-shadow:0 2px 0 rgba(31,58,95,0.05);
  }
  #score-stat{color:var(--purple);}
  .hud-btn{
    background:#fff;
    border:none;
    border-radius:10px;
    width:28px;height:28px;
    font-size:12px;
    box-shadow:0 2px 0 rgba(31,58,95,0.05);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  #play-area{
    position:relative;
    flex:1; 
    overflow:hidden;
    background:linear-gradient(180deg,var(--sky-top) 0%, var(--sky-bottom) 100%);
  }

  #ground-line{
    position:absolute;
    left:0; right:0;
    height:5px;
    background:repeating-linear-gradient(90deg, var(--fence) 0 14px, #2f7a4f 14px 16px);
    z-index:3;
  }

  /* Mode 1 Element - 純注音符號 */
  .falling{
    position:absolute;
    top:0;
    width:44px; height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fff;
    border-radius:50%;
    border:2.5px solid var(--purple);
    box-shadow:0 3px 0 rgba(31,58,95,0.1);
    z-index:2;
  }
  .falling .zh{
    font-weight:900;
    font-size:22px;
    color:var(--ink);
    line-height:1;
  }

  /* 🎧 Mode 2: Listening UI */
  #listening-ui {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2;
    padding: 12px;
  }
  #listening-ui.active { display: flex; }
  
  .audio-big-btn {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: #fff;
    border: 5px solid var(--purple);
    box-shadow: 0 8px 0 rgba(140,122,230,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }
  .audio-big-btn.waiting {
    opacity: 0.5;
    border-color: #94a3b8;
  }
  
  .listening-tip {
    margin-top: 12px;
    background: rgba(31,58,95,0.75);
    color: #fff;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    max-width: 90%;
  }

  /* Mode 2 計時器 */
  #timer-bar-container {
    display: none;
    width: 80%;
    margin: 8px auto 0 auto;
    height: 10px;
    background: rgba(255,255,255,0.4);
    border-radius: 8px;
    border: 1.5px solid #fff;
    overflow: hidden;
    z-index: 4;
    position: relative;
  }
  #timer-bar-fill {
    width: 100%; height: 100%;
    background: linear-gradient(90deg, #8C7AE6, #FF6B6B);
    border-radius: 4px;
  }
  
  .float-score{
    position:absolute;
    font-weight:700;
    color:var(--purple);
    font-size:16px;
    z-index:6;
    animation:floatUp .7s forwards;
  }
  @keyframes floatUp{
    from{opacity:1; transform:translateY(0);}
    to{opacity:0; transform:translateY(-25px);}
  }

  /* ⌨️ 注音鍵盤（純注音無英文提示） */
  #keyboard{
    background:#EAF3FB;
    padding:4px 4px env(safe-area-inset-bottom, 8px); 
    z-index:5;
    position:relative;
    border-top:1.5px solid #d5e6f5;
    flex-shrink: 0;
  }
  .kb-row{
    display:flex;
    justify-content:center;
    gap:3px;
    margin-bottom:3px;
  }
  .key{
    flex:1;
    max-width:42px;
    height: 38px; 
    background:#fff;
    border:none;
    border-radius:5px;
    box-shadow:0 2px 0 rgba(31,58,95,0.12);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
  }
  .key .zh{font-weight:700; font-size:16px; color:var(--ink); line-height: 1;}
  .key:active{transform:translateY(1px); box-shadow:0 1px 0 rgba(31,58,95,0.12); background:#f0f4f8;}
  .key.ghost { background:transparent; box-shadow:none; }
  .key.ghost .zh{color:#b9c9dd; font-size:10px;}

  /* ---- Pause Overlay ---- */
  #pause-overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(31, 58, 95, 0.6);
    backdrop-filter: blur(4px);
    z-index: 10;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  #pause-overlay.active { display: flex; }
  .pause-card {
    background: var(--card);
    border-radius: 20px;
    padding: 24px 16px;
    max-width: 260px;
    width: 100%;
    text-align: center;
  }
  .pause-title {
    font-size: 24px;
    font-weight: 800;
    color: var(--purple);
    margin: 0 0 16px;
  }
  .pause-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  button.secondary {
    background: #e2e9f3;
    color: #4a5d78;
    border: none;
    font-size: 14px;
    font-weight: 700;
    padding: 10px 0;
    border-radius: 999px;
    box-shadow: 0 3px 0 #cbd5e1;
  }

  /* ---- Game Over Screen ---- */
  #screen-over{
    align-items:center;
    justify-content:center;
    padding:20px;
    text-align:center;
  }
  .over-card{
    background:var(--card);
    border-radius:24px;
    padding:24px 20px;
    box-shadow:var(--shadow);
    max-width:280px;
    width:100%;
  }
  .over-title{
    font-size:24px;
    font-weight:800;
    color:var(--coral-dark);
    margin:0 0 14px;
  }
  .over-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:8px 0;
    border-bottom:1px dashed #e2e9f2;
  }
  .over-value{font-size:18px; font-weight:700; color:var(--ink);}
  .over-value.best{color:var(--sun);}
  .new-best{
    font-size:10px;
    background:var(--sun);
    color:#7a4b00;
    font-weight:700;
    padding:1px 6px;
    border-radius:999px;
    margin-left:4px;
  }
  #restart-btn{margin-top:16px;}
</style>
</head>
<body>

<div id="stage">

  <section id="screen-start" class="screen active">
    <div class="sun"></div>
    <div class="title-card">
      <div class="logo-symbols">ㄅ ㄆ ㄇ ㄈ</div>
      <h1 class="game-title display">Zhuyin Master</h1>
      
      <div class="mode-selector">
        <button class="mode-tab active" id="tab-mode-1">💧 Master Challenge</button>
        <button class="mode-tab" id="tab-mode-2">🔊 Listening Test</button>
      </div>
      
      <div class="custom-mode-box">
        <div class="speed-ctrl-container">
          <div class="speed-label-row">
            <span>⚙️ Initial Speed:</span>
            <span id="speed-slider-val" style="color:var(--purple); font-weight:700;">Spd 1</span>
          </div>
          <input type="range" id="initial-speed-range" class="speed-slider" min="1" max="10" value="1">
        </div>

        <div class="custom-mode-title">
          <span id="pool-title-label">🎯 Characters Range:</span>
          <div>
            <button class="custom-ctrl-btn" id="btn-select-all">All</button>
            <button class="custom-ctrl-btn" id="btn-clear-all" style="margin-left:4px;">Clear</button>
          </div>
        </div>
        <div class="checkbox-grid" id="zhuyin-selector-grid"></div>
      </div>

      <div class="high-score-pill" id="start-highscore">🏆 Best: 0 Pts</div>
      <br>
      <button class="primary display" id="start-btn">START GAME</button>
      <div style="margin-top:6px;">
        <button id="test-sound-btn" style="font-size:11px;background:#F4F9FF;border:1px solid #dbe8f7;color:#3a5170;padding:4px 12px;border-radius:999px;">🔊 Test Sound</button>
        <div id="test-sound-result" style="font-size:10px;color:#5b7291;margin-top:2px;"></div>
      </div>
    </div>
  </section>

  <section id="screen-game" class="screen">
    <div id="hud">
      <div class="hud-top-row">
        <div id="hearts"></div>
        <div id="hud-right">
          <div class="stat display" id="score-stat">0 Pts</div>
        </div>
        <div style="display:flex; gap:4px;">
          <button id="sound-toggle" class="hud-btn">🔊</button>
          <button id="pause-btn" class="hud-btn">⏸️</button>
        </div>
      </div>
      <div class="hud-bottom-row">
        <span id="hud-speed-label">⚡ Live Speed: Spd 1</span>
        <input type="range" id="hud-speed-range" class="speed-slider" min="1" max="10" value="1" style="margin:0; flex:1;">
      </div>
      
      <div id="timer-bar-container">
        <div id="timer-bar-fill"></div>
      </div>
    </div>

    <div id="play-area">
      <div id="ground-line"></div>
      
      <div id="listening-ui">
        <button class="audio-big-btn" id="btn-replay-audio">🔊</button>
        <div class="listening-tip" id="listening-status-text">Listen carefully and tap the keyboard below!</div>
      </div>
      
      <div id="pause-overlay">
        <div class="pause-card">
          <div class="pause-title display">PAUSED</div>
          <div class="pause-actions">
            <button class="primary display" id="resume-btn">RESUME</button>
            <button class="secondary" id="quit-btn">QUIT</button>
          </div>
        </div>
      </div>
    </div>

    <div id="keyboard"></div>
  </section>

  <section id="screen-over" class="screen">
    <div class="over-card">
      <div class="over-title display">GAME OVER</div>
      <div class="over-row">
        <span class="over-label">Your Score</span>
        <span class="over-value display" id="final-score">0 Pts</span>
      </div>
      <div class="over-row">
        <span class="over-label">High Score <span id="new-best-badge"></span></span>
        <span class="over-value best display" id="final-best">0 Pts</span>
      </div>
      <button class="primary display" id="restart-btn">PLAY AGAIN</button>
    </div>
  </section>
</div>

<script>
(function(){
  "use strict";

  var ROWS = [
    [["1","ㄅ"],["2","ㄉ"],["3",null],["4",null],["5","ㄓ"],["6",null],["7",null],["8","ㄚ"],["9","ㄞ"],["0","ㄢ"],["-","ㄦ"]],
    [["q","ㄆ"],["w","ㄊ"],["e","ㄍ"],["r","ㄐ"],["t","ㄔ"],["y","ㄗ"],["u","ㄧ"],["i","ㄛ"],["o","ㄟ"],["p","ㄣ"]],
    [["a","ㄇ"],["s","ㄋ"],["d","ㄎ"],["f","ㄑ"],["g","ㄕ"],["h","ㄘ"],["j","ㄨ"],["k","ㄜ"],["l","ㄠ"],[";","ㄤ"]],
    [["z","ㄈ"],["x","ㄌ"],["c","ㄏ"],["v","ㄒ"],["b","ㄖ"],["n","ㄙ"],["m","ㄩ"],[",","ㄝ"],[".","ㄡ"],["/","ㄥ"]]
  ];

  var KEY_TO_SYMBOL = {};   
  var SYMBOL_TO_KEY = {};   
  var ALL_SYMBOLS = [];
  ROWS.forEach(function(row){
    row.forEach(function(pair){
      var key = pair[0], sym = pair[1];
      if(sym){
        KEY_TO_SYMBOL[key] = sym;
        SYMBOL_TO_KEY[sym] = key;
        ALL_SYMBOLS.push(sym);
      }
    });
  });

  var READING = {
    "ㄅ":"ㄅㄛ","ㄆ":"ㄆㄛ","ㄇ":"ㄇㄛ","ㄈ":"ㄈㄛ",
    "ㄉ":"ㄉㄜ","ㄊ":"ㄊㄜ","ㄋ":"ㄋㄜ","ㄌ":"ㄌㄜ",
    "ㄍ":"ㄍㄜ","ㄎ":"ㄎㄜ","ㄏ":"ㄏㄜ",
    "ㄐ":"ㄐㄧ","ㄑ":"ㄑㄧ","ㄒ":"ㄒㄧ",
    "ㄓ":"ㄓ","ㄔ":"ㄔ","ㄕ":"ㄕ","ㄖ":"ㄖ",
    "ㄗ":"ㄗ","ㄘ":"ㄘ","ㄙ":"ㄙ",
    "ㄧ":"ㄧ","ㄨ":"ㄨ","ㄩ":"ㄩ",
    "ㄚ":"ㄚ","ㄛ":"ㄛ","ㄜ":"ㄜ","ㄝ":"ㄝ",
    "ㄞ":"ㄞ","ㄟ":"ㄟ","ㄠ":"ㄠ","ㄡ":"ㄡ",
    "ㄢ":"ㄢ","ㄣ":"ㄣ","ㄤ":"ㄤ","ㄥ":"ㄥ","ㄦ":"ㄦ"
  };

  var activePool = [].concat(ALL_SYMBOLS); 

  function getStorageKey() {
    return 'zhuyin-game-best-m' + state.gameMode;
  }

  function loadHighScore(){
    var key = getStorageKey();
    if(typeof window.storage !== 'undefined') {
      window.storage.get(key).then(function(res){
        var score = (res && res.value) ? parseInt(res.value,10) || 0 : 0;
        updateHighScoreUI(score);
      }).catch(function(){ updateHighScoreUI(0); });
    } else {
      updateHighScoreUI(0);
    }
  }
  
  function updateHighScoreUI(score) {
    document.getElementById('start-highscore').textContent = '🏆 Best Score: ' + score + ' Pts';
  }

  function saveHighScore(v){
    if(typeof window.storage !== 'undefined') {
      window.storage.set(getStorageKey(), String(v)).catch(function(){});
    }
  }

  var state = {
    gameMode: 1, 
    activeScreen: 'start', 
    playing:false,
    paused:false, 
    lives:5,
    score:0,
    successCount:0,
    speedLevel:1,
    soundOn:true,
    spawnInterval:2500,
    fallDuration:10000,
    currentQuestion: null, 
    mode2TimeLimit: 20000, 
    mode2TimeLeft: 20000,
    mode2IsWaitingForNext: false 
  };
  
  var fallingItems = []; 
  var spawnTimer = null;
  var rafId = null;
  var itemSeq = 0;
  var lastTickTime = 0; 

  var playArea = document.getElementById('play-area');
  var groundLine = document.getElementById('ground-line');
  var heartsEl = document.getElementById('hearts');
  var scoreStat = document.getElementById('score-stat');
  var soundToggle = document.getElementById('sound-toggle');
  var pauseBtn = document.getElementById('pause-btn');
  var pauseOverlay = document.getElementById('pause-overlay');
  
  var speedRangeInput = document.getElementById('initial-speed-range');
  var speedSliderValLabel = document.getElementById('speed-slider-val');
  var hudSpeedRange = document.getElementById('hud-speed-range');
  var hudSpeedLabel = document.getElementById('hud-speed-label');

  var listeningUi = document.getElementById('listening-ui');
  var replayAudioBtn = document.getElementById('btn-replay-audio');
  var listeningStatusText = document.getElementById('listening-status-text');
  var timerBarContainer = document.getElementById('timer-bar-container');
  var timerBarFill = document.getElementById('timer-bar-fill');

  var GROUND_PERCENT = 88; 
  var AUDIO_BASE = "https://language.moe.gov.tw/001/Upload/files/site_content/M0001/juyin/html_ch/audio/";
  
  var CANONICAL_ORDER = [
    "ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ","ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","ㄕ","ㄖ","ㄗ","ㄘ","ㄙ",
    "ㄚ","ㄛ","ㄜ","ㄝ","ㄞ","ㄟ","ㄠ","ㄡ","ㄢ","ㄣ","ㄤ","ㄥ","ㄦ",
    "ㄧ","ㄨ","ㄩ"
  ];
  
  var SYMBOL_TO_AUDIO = {};
  CANONICAL_ORDER.forEach(function(sym, idx){
    SYMBOL_TO_AUDIO[sym] = AUDIO_BASE + "F" + (idx+1) + ".WAV";
  });
  var audioCache = {}; 

  function warmUpAudio(){
    CANONICAL_ORDER.forEach(function(sym){
      try{
        var a = new Audio(SYMBOL_TO_AUDIO[sym]);
        a.preload = 'auto';
        audioCache[sym] = a;
      }catch(e){}
    });
  }

  function playPronunciation(symbol, onEndedCallback){
    if(!state.soundOn) {
      if(onEndedCallback) setTimeout(onEndedCallback, 600);
      return;
    }
    var a = audioCache[symbol];
    try{
      if(a){
        a.currentTime = 0;
        if(onEndedCallback) {
          a.onended = function() { a.onended = null; onEndedCallback(); };
        }
        var p = a.play();
        if(p && p.catch) {
          p.catch(function(){ speak(symbol, onEndedCallback); });
        }
        return;
      }
    }catch(e){}
    speak(symbol, onEndedCallback); 
  }

  var audioCtx = null;
  function getAudioCtx(){
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ audioCtx = null; }
    }
    return audioCtx;
  }

  function playKlaxonHorn(onEndedCallback) {
    if(!state.soundOn) {
      if(onEndedCallback) setTimeout(onEndedCallback, 400);
      return;
    }
    var ctx = getAudioCtx();
    if(!ctx) {
      if(onEndedCallback) setTimeout(onEndedCallback, 400);
      return;
    }
    try {
      if(ctx.state === 'suspended'){ ctx.resume(); }
      var now = ctx.currentTime;
      var osc1 = ctx.createOscillator();
      var gainNode = ctx.createGain();
      osc1.type = 'sawtooth'; 
      osc1.frequency.setValueAtTime(130, now);
      gainNode.gain.setValueAtTime(0.15, now);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc1.connect(gainNode);
      gainNode.connect(ctx.destination);
      osc1.start(now);
      osc1.stop(now + 0.3);
      if(onEndedCallback) setTimeout(onEndedCallback, 350);
    } catch(e) {
      if(onEndedCallback) setTimeout(onEndedCallback, 350);
    }
  }

  function speak(symbol, onEndedCallback){
    if(!state.soundOn) {
      if(onEndedCallback) setTimeout(onEndedCallback, 500);
      return;
    }
    if(!('speechSynthesis' in window)) {
      if(onEndedCallback) setTimeout(onEndedCallback, 500);
      return;
    }
    try{
      var text = READING[symbol] || symbol;
      var SampleUtterance = new SpeechSynthesisUtterance(text);
      SampleUtterance.lang = 'zh-TW';
      SampleUtterance.rate = 0.9;
      if(onEndedCallback) {
        SampleUtterance.onend = function() { onEndedCallback(); };
        SampleUtterance.onerror = function() { onEndedCallback(); };
      }
      window.speechSynthesis.speak(SampleUtterance);
    }catch(e){
      if(onEndedCallback) setTimeout(onEndedCallback, 500);
    }
  }

  function unlockAudio(){
    var ctx = getAudioCtx();
    if(ctx && ctx.state === 'suspended') ctx.resume();
    warmUpAudio();
  }

  function renderHearts(){
    heartsEl.innerHTML = '';
    for(var i=0;i<5;i++){
      var span = document.createElement('span');
      span.className = 'heart' + (i < state.lives ? '' : ' lost');
      span.textContent = i < state.lives ? '❤️' : '🤍';
      heartsEl.appendChild(span);
    }
  }

  /* 🛠️ 鍵盤建構：完全移除英文字母顯示，僅保留注音 */
  function buildKeyboard(){
    var kb = document.getElementById('keyboard');
    kb.innerHTML = '';
    ROWS.forEach(function(row){
      var rowEl = document.createElement('div');
      rowEl.className = 'kb-row';
      row.forEach(function(pair){
        var key = pair[0], sym = pair[1];
        var btn = document.createElement('button');
        btn.className = 'key' + (sym ? '' : ' ghost');
        if(sym){
          btn.innerHTML = '<span class="zh">'+sym+'</span>';
          btn.addEventListener('pointerdown', function(e){
            e.preventDefault();
            handleKeyInput(key);
          });
        } else {
          btn.innerHTML = '<span class="zh">·</span>';
          btn.disabled = true;
        }
        rowEl.appendChild(btn);
      });
      kb.appendChild(rowEl);
    });
  }

  function buildZhuyinSelector(){
    var grid = document.getElementById('zhuyin-selector-grid');
    grid.innerHTML = '';
    CANONICAL_ORDER.forEach(function(sym){
      var label = document.createElement('label');
      label.className = 'check-label';
      label.innerHTML = '<input type="checkbox" value="'+sym+'" checked><span>'+sym+'</span>';
      grid.appendChild(label);
    });

    document.getElementById('btn-select-all').addEventListener('click', function(){
      grid.querySelectorAll('input[type="checkbox"]').forEach(function(cb){ cb.checked = true; });
    });
    document.getElementById('btn-clear-all').addEventListener('click', function(){
      grid.querySelectorAll('input[type="checkbox"]').forEach(function(cb){ cb.checked = false; });
    });
  }

  function updateActivePool(){
    var pool = [];
    var checkboxes = document.querySelectorAll('#zhuyin-selector-grid input[type="checkbox"]');
    checkboxes.forEach(function(cb){
      if(cb.checked){ pool.push(cb.value); }
    });
    activePool = pool;
    return pool.length > 0;
  }

  /* ⚡ 速度設置：遊戲一加速 2 倍（掉落與生成減半），遊戲二放慢 2 倍（時間擴增為2倍） */
  function calculateTimingsBySpeed(level) {
    var spawnInterval = (4800 - (level - 1) * 420) / 2;
    var fallDuration = (19000 - (level - 1) * 1700) / 2;
    var m2Limit = (9500 - (level - 1) * 900) * 2; 
    return {
      spawnInterval: Math.max(450, spawnInterval),
      fallDuration: Math.max(2000, fallDuration),
      m2Limit: Math.max(4400, m2Limit)
    };
  }

  function setSpeedRuntime(level) {
    state.speedLevel = level;
    var timings = calculateTimingsBySpeed(level);
    state.spawnInterval = timings.spawnInterval;
    state.fallDuration = timings.fallDuration;
    
    var oldLimit = state.mode2TimeLimit;
    state.mode2TimeLimit = timings.m2Limit;
    if(state.gameMode === 2 && oldLimit > 0 && !state.mode2IsWaitingForNext) {
      state.mode2TimeLeft = (state.mode2TimeLeft / oldLimit) * state.mode2TimeLimit;
    }
    
    hudSpeedRange.value = level;
    hudSpeedLabel.textContent = '⚡ Speed: Spd ' + level;
  }

  var spawnTimeLeft = 0; 

  /* 🛠️ 下落注音泡泡：完全移除英文提示 */
  function spawnSymbol(){
    if(activePool.length === 0) return;
    var sym = activePool[Math.floor(Math.random()*activePool.length)];
    var key = SYMBOL_TO_KEY[sym];
    var el = document.createElement('div');
    el.className = 'falling';
    el.innerHTML = '<span class="zh">'+sym+'</span>';
    var leftPercent = 6 + Math.random()*82; 
    el.style.left = leftPercent + '%';
    el.style.top = '0%';
    playArea.appendChild(el);

    var item = {
      id: ++itemSeq,
      char: sym,
      key: key,
      el: el,
      startTime: performance.now()
    };
    fallingItems.push(item);
  }

  function scheduleNextSpawn(customDelay){
    if(!state.playing || state.paused || state.gameMode !== 1) return;
    var delay = (customDelay !== undefined) ? customDelay : state.spawnInterval;
    spawnTimeLeft = delay;

    spawnTimer = setTimeout(function(){
      spawnSymbol();
      scheduleNextSpawn();
    }, delay);
  }

  function generateListeningQuestion(generateNew) {
    if(!state.playing || state.gameMode !== 2) return;
    if(activePool.length === 0) return;
    
    if (generateNew === undefined) generateNew = true; 

    state.mode2IsWaitingForNext = true;
    replayAudioBtn.classList.add('waiting');
    listeningStatusText.textContent = "🎧 Loading Next Sound...";
    timerBarFill.style.width = '100%';

    if (generateNew) {
      var randomSymbol = activePool[Math.floor(Math.random() * activePool.length)];
      state.currentQuestion = randomSymbol;
    }
    
    var timings = calculateTimingsBySpeed(state.speedLevel);
    state.mode2TimeLimit = timings.m2Limit;
    state.mode2TimeLeft = timings.m2Limit;
    
    var fallbackTriggered = false;
    var forceUnlockTimeout = setTimeout(function(){
      if(!state.playing || state.paused) return;
      if(state.mode2IsWaitingForNext) {
        fallbackTriggered = true;
        state.mode2IsWaitingForNext = false;
        replayAudioBtn.classList.remove('waiting');
        listeningStatusText.textContent = "Listen & Tap the correct key!";
      }
    }, 1200);

    setTimeout(function() {
      if(!state.playing || state.paused || fallbackTriggered) return;
      playPronunciation(state.currentQuestion, function() {
        clearTimeout(forceUnlockTimeout);
        if(!state.playing || state.paused) return;
        state.mode2IsWaitingForNext = false; 
        replayAudioBtn.classList.remove('waiting');
        listeningStatusText.textContent = "Listen & Tap the correct key!";
      });
    }, 200);
  }

  function tick(now){
    if(!state.playing) return;
    if(state.paused) {
      lastTickTime = now;
      rafId = requestAnimationFrame(tick);
      return;
    }

    var deltaTime = now - lastTickTime;
    lastTickTime = now;
    
    if (state.gameMode === 1) {
      if (spawnTimeLeft > 0) spawnTimeLeft -= deltaTime;
      var h = playArea.clientHeight || 400;
      var groundPixel = h * (GROUND_PERCENT / 100);
      groundLine.style.top = groundPixel + 'px';

      for(var i=fallingItems.length-1;i>=0;i--){
        var item = fallingItems[i];
        if (item.pausedTimeDelta) {
          item.startTime += item.pausedTimeDelta;
          delete item.pausedTimeDelta;
        }
        var elapsed = now - item.startTime;
        var progress = elapsed / state.fallDuration;
        if(progress >= 1){
          removeItemAt(i);
          playKlaxonHorn(); 
          loseLife();
          continue;
        }
        item.el.style.top = (progress * GROUND_PERCENT) + '%';
      }
    } 
    else if (state.gameMode === 2) {
      if (!state.mode2IsWaitingForNext) {
        state.mode2TimeLeft -= deltaTime;
        if (state.mode2TimeLeft <= 0) {
          state.mode2TimeLeft = 0;
          timerBarFill.style.width = '0%';
          
          deductPointsOrLife();
          if (state.lives > 0) {
            playKlaxonHorn(function() {
              generateListeningQuestion(false); 
            });
          }
        } else {
          var percentage = (state.mode2TimeLeft / state.mode2TimeLimit) * 100;
          timerBarFill.style.width = percentage + '%';
        }
      }
    }
    rafId = requestAnimationFrame(tick);
  }

  function removeItemAt(index){
    var item = fallingItems[index];
    if(!item) return;
    if(item.el.parentNode) item.el.parentNode.removeChild(item.el);
    fallingItems.splice(index,1);
  }

  function deductPointsOrLife() {
    state.score = Math.max(0, state.score - 5);
    scoreStat.textContent = state.score + ' Pts';
    var areaRect = playArea.getBoundingClientRect();
    showFloatingScore(areaRect.width/2 - 25, 30, '-5 Pts', '#FF6B6B');
    state.lives--;
    renderHearts();
    if(state.lives <= 0) endGame();
  }

  function loseLife(){
    state.lives--;
    renderHearts();
    if(state.lives <= 0) endGame();
  }

  function showFloatingScore(x, y, text, color){
    var f = document.createElement('div');
    f.className = 'float-score';
    f.textContent = text;
    f.style.left = x + 'px';
    f.style.top = y + 'px';
    f.style.color = color || '';
    playArea.appendChild(f);
    setTimeout(function(){ if(f.parentNode) f.parentNode.removeChild(f); }, 700);
  }

  function handleKeyInput(rawKey){
    if(!state.playing || state.paused) return; 
    if (state.gameMode === 2 && state.mode2IsWaitingForNext) return;

    var key = rawKey.toLowerCase();
    var symbol = KEY_TO_SYMBOL[key];
    if(!symbol) return; 

    if (state.gameMode === 1) {
      var matchIndex = -1;
      var earliestStart = Infinity;
      for(var i=0; i<fallingItems.length; i++){
        if(fallingItems[i].char === symbol && fallingItems[i].startTime < earliestStart){
          earliestStart = fallingItems[i].startTime;
          matchIndex = i;
        }
      }
      if(matchIndex === -1){
        playKlaxonHorn(); 
        loseLife();
        return;
      }
      var item = fallingItems[matchIndex];
      var rect = item.el.getBoundingClientRect();
      var areaRect = playArea.getBoundingClientRect();
      showFloatingScore(rect.left - areaRect.left, rect.top - areaRect.top, '+5 Pts', '#8C7AE6');
      playPronunciation(symbol);
      removeItemAt(matchIndex);
      processSuccess();
    } 
    else if (state.gameMode === 2) {
      state.mode2IsWaitingForNext = true; 
      replayAudioBtn.classList.add('waiting');

      if (symbol === state.currentQuestion) {
        var areaRect = playArea.getBoundingClientRect();
        showFloatingScore(areaRect.width/2 - 25, 30, '+5 Pts', '#8C7AE6');
        processSuccess();
        
        listeningStatusText.textContent = "🎉 Correct! Perfect!";
        setTimeout(function() {
          if(!state.playing || state.paused) return;
          generateListeningQuestion(true); 
        }, 600);
      } else {
        deductPointsOrLife();
        if (state.lives > 0) {
          listeningStatusText.textContent = "❌ Wrong! Listen again...";
          playKlaxonHorn(function() {
            generateListeningQuestion(false); 
          });
        }
      }
    }
  }

  function processSuccess() {
    state.score += 5;
    state.successCount += 1;
    scoreStat.textContent = state.score + ' Pts';
    if(state.successCount % 10 === 0 && state.speedLevel < 10){
      setSpeedRuntime(state.speedLevel + 1);
    }
  }

  document.addEventListener('keydown', function(e){
    if(e.repeat) return;
    if(state.activeScreen === 'game' && !state.paused) {
      handleKeyInput(e.key);
    }
  });

  var pauseStartTimestamp = 0;
  function pauseGame() {
    if (!state.playing || state.paused) return;
    state.paused = true;
    pauseStartTimestamp = performance.now();
    clearTimeout(spawnTimer); 
    pauseOverlay.classList.add('active');
  }

  function resumeGame() {
    if (!state.playing || !state.paused) return;
    state.paused = false;
    var pauseDuration = performance.now() - pauseStartTimestamp;
    if (state.gameMode === 1) {
      fallingItems.forEach(function(item) { item.startTime += pauseDuration; });
      scheduleNextSpawn(Math.max(50, spawnTimeLeft));
    }
    pauseOverlay.classList.remove('active');
  }

  function quitToMenu() {
    state.playing = false;
    clearTimeout(spawnTimer);
    cancelAnimationFrame(rafId);
    pauseOverlay.classList.remove('active');
    loadHighScore();
    showScreen('screen-start');
  }

  function showScreen(id){
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
    if(id === 'screen-start') state.activeScreen = 'start';
    if(id === 'screen-game') state.activeScreen = 'game';
    if(id === 'screen-over') state.activeScreen = 'over';
  }

  function setupGameLayout() {
    if(state.gameMode === 1) {
      groundLine.style.display = 'block';
      listeningUi.classList.remove('active');
      timerBarContainer.style.display = 'none'; 
    } else {
      groundLine.style.display = 'none';
      listeningUi.classList.add('active');
      timerBarContainer.style.display = 'block'; 
    }
  }

  function resetState(){
    var chosenSpeed = parseInt(speedRangeInput.value, 10) || 1;
    state.playing = true;
    state.paused = false;
    state.lives = 5;
    state.score = 0;
    state.successCount = 0;
    state.mode2IsWaitingForNext = false;
    setSpeedRuntime(chosenSpeed);
    setupGameLayout();
    pauseOverlay.classList.remove('active');
    fallingItems.forEach(function(item){ if(item.el.parentNode) item.el.parentNode.removeChild(item.el); });
    fallingItems = [];
    renderHearts();
    scoreStat.textContent = '0 Pts';
  }

  function startGame(){
    resetState();
    showScreen('screen-game');
    lastTickTime = performance.now();
    if (state.gameMode === 1) scheduleNextSpawn();
    else generateListeningQuestion(true);
    rafId = requestAnimationFrame(tick);
  }

  function endGame(){
    state.playing = false;
    clearTimeout(spawnTimer);
    cancelAnimationFrame(rafId);
    var bestKey = getStorageKey();
    if(typeof window.storage !== 'undefined') {
      window.storage.get(bestKey).then(function(res){
        var currentBest = (res && res.value) ? parseInt(res.value,10) || 0 : 0;
        proceedEnd(currentBest);
      }).catch(function(){ proceedEnd(0); });
    } else {
      proceedEnd(0);
    }
  }
  
  function proceedEnd(bestVal) {
    var isNewBest = state.score > bestVal;
    if(isNewBest){
      bestVal = state.score;
      saveHighScore(bestVal);
    }
    document.getElementById('final-score').textContent = state.score + ' Pts';
    document.getElementById('final-best').textContent = bestVal + ' Pts';
    document.getElementById('new-best-badge').innerHTML = isNewBest ? '<span class="new-best">NEW!</span>' : '';
    showScreen('screen-over');
  }

  document.getElementById('tab-mode-1').addEventListener('click', function() {
    state.gameMode = 1;
    this.classList.add('active');
    document.getElementById('tab-mode-2').classList.remove('active');
    loadHighScore();
  });
  document.getElementById('tab-mode-2').addEventListener('click', function() {
    state.gameMode = 2;
    this.classList.add('active');
    document.getElementById('tab-mode-1').classList.remove('active');
    loadHighScore();
  });

  speedRangeInput.addEventListener('input', function() {
    speedSliderValLabel.textContent = 'Spd ' + speedRangeInput.value;
  });
  hudSpeedRange.addEventListener('input', function() {
    setSpeedRuntime(parseInt(hudSpeedRange.value, 10) || 1);
  });
  soundToggle.addEventListener('click', function(){
    state.soundOn = !state.soundOn;
    soundToggle.textContent = state.soundOn ? '🔊' : '🔇';
  });
  pauseBtn.addEventListener('click', pauseGame);
  document.getElementById('resume-btn').addEventListener('click', resumeGame);
  document.getElementById('quit-btn').addEventListener('click', quitToMenu);
  replayAudioBtn.addEventListener('click', function() {
    if (state.playing && !state.paused && state.currentQuestion && !state.mode2IsWaitingForNext) {
      playPronunciation(state.currentQuestion);
    }
  });

  document.getElementById('test-sound-btn').addEventListener('click', function(){
    unlockAudio();
    var out = document.getElementById('test-sound-result');
    out.innerHTML = 'Testing...';
    try{
      playKlaxonHorn();
      out.innerHTML = '✅ Audio active. Click START to play!';
    }catch(e){ out.innerHTML = '❌ Sound blocked.'; }
  });

  document.getElementById('start-btn').addEventListener('click', function(){
    unlockAudio();
    if(!updateActivePool()){ alert('Check at least one character!'); return; }
    startGame();
  });
  document.getElementById('restart-btn').addEventListener('click', function(){
    unlockAudio();
    startGame();
  });

  buildKeyboard();
  buildZhuyinSelector();
  loadHighScore();
})();
</script>
</body>
</html>
